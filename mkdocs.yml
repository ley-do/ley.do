site_name: LEY.DO
site_description: Archivo público independiente de documentos legales dominicanos.
site_url: https://ley.do
repo_name: ley-do/ley.do
repo_url: https://github.com/ley-do/ley.do

theme:
  name: material
  language: es
  font:
    text: Source Sans 3
    code: Source Code Pro
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - assets/stylesheets/leydo.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables

nav:
  - Inicio: index.md
  - Constitución:
      - constitucion/index.md
  - Leyes:
      - leyes/index.md
      - 2016: leyes/2016/index.md
      - 2017: leyes/2017/index.md
      - 2018: leyes/2018/index.md
      - 2019: leyes/2019/index.md
      - 2020: leyes/2020/index.md
      - 2021: leyes/2021/index.md
      - 2022: leyes/2022/index.md
      - 2023: leyes/2023/index.md
      - 2024: leyes/2024/index.md
      - 2025: leyes/2025/index.md
      - 2026: leyes/2026/index.md
  - Decretos:
      - decretos/index.md
      - 2016: decretos/2016/index.md
      - 2017: decretos/2017/index.md
      - 2018: decretos/2018/index.md
      - 2019: decretos/2019/index.md
      - 2020: decretos/2020/index.md
      - 2021: decretos/2021/index.md
      - 2022: decretos/2022/index.md
      - 2023: decretos/2023/index.md
      - 2024: decretos/2024/index.md
      - 2025: decretos/2025/index.md
      - 2026: decretos/2026/index.md
  - Resoluciones:
      - resoluciones/index.md
  - Proyectos:
      - proyectos/index.md
  - API:
      - api/index.md
  - Certificados:
      - certificados/index.md
  - Acerca:
      - acerca/index.md
      - Descargo: acerca/descargo.md
