<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1000" role="img" aria-labelledby="t d">
<title id="t">Arquitectura cívica y archivo legal</title>
<desc id="d">Ilustración monocroma de tinta de un edificio cívico neoclásico caribeño, documentos y vegetación tropical.</desc>
<defs>
  <pattern id="paper" width="18" height="18" patternUnits="userSpaceOnUse"><circle cx="2" cy="3" r=".7" fill="#111" opacity=".06"/><circle cx="13" cy="11" r=".45" fill="#111" opacity=".05"/></pattern>
  <pattern id="hatch" width="11" height="11" patternUnits="userSpaceOnUse" patternTransform="rotate(18)"><line x1="0" y1="0" x2="0" y2="11" stroke="#171717" stroke-width="1" opacity=".20"/></pattern>
  <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" seed="7" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale=".7"/></filter>
</defs>
<rect width="1800" height="1000" fill="#f3f0e9"/>
<rect width="1800" height="1000" fill="url(#paper)"/>
<!-- atmospheric contour lines -->
