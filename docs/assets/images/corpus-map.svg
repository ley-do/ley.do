<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 320" role="img" aria-labelledby="title desc">
<title id="title">Mapa del corpus LEY.DO</title><desc id="desc">Cinco bloques: Constitución, leyes, decretos, resoluciones y proyectos.</desc>
<rect width="980" height="320" rx="28" fill="#f8fafc"/>
<g font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" text-anchor="middle">
<g><rect x="40" y="70" width="160" height="170" rx="22" fill="#e0f2fe"/><text x="120" y="150" fill="#075985" font-size="20">Constitución</text><text x="120" y="178" fill="#075985" font-size="13" opacity=".72">versiones</text></g>
<g><rect x="225" y="70" width="160" height="170" rx="22" fill="#dcfce7"/><text x="305" y="150" fill="#166534" font-size="20">Leyes</text><text x="305" y="178" fill="#166534" font-size="13" opacity=".72">por año</text></g>
<g><rect x="410" y="70" width="160" height="170" rx="22" fill="#fef3c7"/><text x="490" y="150" fill="#92400e" font-size="20">Decretos</text><text x="490" y="178" fill="#92400e" font-size="13" opacity=".72">por año</text></g>
<g><rect x="595" y="70" width="160" height="170" rx="22" fill="#ede9fe"/><text x="675" y="150" fill="#5b21b6" font-size="20">Resoluciones</text><text x="675" y="178" fill="#5b21b6" font-size="13" opacity=".72">en preparación</text></g>
<g><rect x="780" y="70" width="160" height="170" rx="22" fill="#fee2e2"/><text x="860" y="150" fill="#991b1b" font-size="20">Proyectos</text><text x="860" y="178" fill="#991b1b" font-size="13" opacity=".72">legislativos</text></g>
</g></svg>